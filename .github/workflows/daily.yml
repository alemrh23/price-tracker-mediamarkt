name: Daily price check (19:00 Canary)

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Only run at 19:00 Canary time
        run: |
          HOUR=$(TZ=Atlantic/Canary date +%H)
          if [ "$HOUR" != "19" ]; then
            echo "Not 19:00 in Canary (hour=$HOUR). Exiting."
            exit 0
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        id: run
        run: |
          python track_price.py | tee out.txt
          PRICE=$(grep -E '^PRICE=' out.txt | cut -d= -f2)
          CHANGED=$(grep -E '^CHANGED=' out.txt | cut -d= -f2 || echo 0)
          PREV=$(grep -E '^PREV_PRICE=' out.txt | cut -d= -f2 || echo "")
          FIRST=$(grep -E '^FIRST_RUN=' out.txt | cut -d= -f2 || echo 0)

          echo "price=$PRICE" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT
          echo "first=$FIRST" >> $GITHUB_OUTPUT

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json
          git commit -m "Update state" || exit 0
          git push

      - name: Send email on change
        if: steps.run.outputs.changed == '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Cambio de precio (MediaMarkt Canarias)"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Cambio detectado en:
            https://canarias.mediamarkt.es/products/plancha-de-vapor-philips-dst7031-70-250-g-apagado-automatico-300-ml-verde-opalo-menta

            Precio anterior: ${{ steps.run.outputs.prev }} €
            Precio nuevo: ${{ steps.run.outputs.price }} €
